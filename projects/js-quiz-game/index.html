<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JavaScript Quiz Game</title>

<!-- Cache busting so GitHub loads newest CSS -->
<link rel="stylesheet" href="style.css?v=3">

</head>

<body>

<header class="header">
<h1>JavaScript Quiz Game</h1>
<p>Certification Practice • Timed Questions • Best Score Saved</p>
</header>

<main class="container">

<section class="card">

<div class="row">
<div class="pill">Time: <strong id="time">60</strong></div>
<div class="pill">Score: <strong id="score">0</strong></div>
<div class="pill">Best: <strong id="bestScore">0</strong></div>
</div>

<h2 id="question">Press Start to Begin</h2>

<div id="choices" class="choices">
<!-- answer buttons appear here -->
</div>

<p id="feedback" class="feedback"></p>

<div class="actions">
<button id="startBtn">Start Quiz</button>
<button id="restartBtn" class="secondary">Restart</button>
</div>

</section>

</main>

<!-- Cache busting ensures newest JS loads -->
<script src="script.js?v=3"></script>

</body>
</html>
